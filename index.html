<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvatore - Player & WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #070a13 0%, #0f172a 100%);
      padding: 20px;
    }

    /* Box Salvatore */
    .box-salvatore {
      position: relative; /* CRUCIAL para que el botón de WhatsApp se posicione bien */
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 35px 25px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    /* Botón de WhatsApp - Posición Absoluta */
    .whatsapp-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
    }

    .whatsapp-btn:hover {
      transform: scale(1.15) rotate(10deg);
      box-shadow: 0 6px 15px rgba(37, 211, 102, 0.5);
    }

    .whatsapp-btn svg { width: 25px; height: 25px; fill: white; }

    .box-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 25px;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #818cf8, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    /* Botonera */
    .button-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

    /* Cuadrícula para las Radios (2 arriba, 2 abajo) */
    .radio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Botones de radio adaptados a ser cuadraditos */
    .btn-square {
      aspect-ratio: 1 / 1;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
      text-align: center;
    }

    .btn-square span.icon {
      font-size: 1.6rem;
    }

    .btn:hover { transform: translateY(-2px); }

    /* Estilos de colores personalizados para cada Radio */
    .btn-rpp { background: linear-gradient(135deg, #0d3b66 0%, #001e3d 100%); }
    .btn-ondacero { background: linear-gradient(135deg, #f25c54 0%, #c41e3a 100%); }
    .btn-quebuena { background: linear-gradient(135deg, #f7b733 0%, #fc4a1a 100%); }
    .btn-radiomar { background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); }
    
    /* Botón América TV (Se mantiene igual) */
    .btn-america { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); width: 100%; }

    /* Reproductor */
    .player-container {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      display: none;
    }

    .video-frame-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
    }

    .video-frame-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .btn-stop {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="box-salvatore">
    <!-- Botón WhatsApp -->
    <a href="https://wa.me/51963845681" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 21.602c-2.64 0-5.28-.68-7.56-1.97l-.54-.32-5.6 1.47 1.49-5.46-.35-.57C1.5 11.23 1.5 8.35 3.32 6.15c1.82-2.2 4.79-3.41 7.89-3.41 2.11 0 4.12.54 5.92 1.61 1.8 1.07 3.16 2.59 3.96 4.45.8 1.86.99 3.86.55 5.75-.44 1.89-1.47 3.56-3.03 4.85-1.56 1.3-3.49 1.99-5.6 1.99z"/></svg>
    </a>

    <h1 class="box-title">Salvatore</h1>
    
    <div class="button-group">
      <!-- Cuadrícula 2x2 para las radios -->
      <div class="radio-grid">
        <!-- 1. RPP -->
        <button class="btn btn-square btn-rpp" onclick="playAudio('https://audio.gruporpp.pe/live/rpp/mp3/icecast.audio', 'RPP')">
          <span class="icon">📻</span>
          <span>RPP</span>
        </button>

        <!-- 2. Radio Onda Cero -->
        <button class="btn btn-square btn-ondacero" onclick="playAudio('https://stream.panamericana.pe/ondacero_mp3', 'Radio Onda Cero')">
          <span class="icon">🔥</span>
          <span>Onda Cero</span>
        </button>

        <!-- 3. Radio Qué Buena (Nueva Q) -->
        <button class="btn btn-square btn-quebuena" onclick="playAudio('https://stream.crpradios.pe/nuevaq.mp3', 'Radio Qué Buena')">
          <span class="icon">🎶</span>
          <span>Qué Buena</span>
        </button>

        <!-- 4. Radio Mar Plus -->
        <button class="btn btn-square btn-radiomar" onclick="playAudio('https://stream.crpradios.pe/radiomar.mp3', 'Radio Mar Plus')">
          <span class="icon">🌊</span>
          <span>Radio Mar</span>
        </button>
      </div>

      <!-- Botón América TV (Se mantiene intacto) -->
      <button class="btn btn-america" onclick="playVideo('https://tvgo.americatv.com.pe/', 'América TV En Vivo')">
        <span>América TV en vivo</span>
      </button>
    </div>

    <div id="playerContainer" class="player-container">
      <div id="playerTitle" style="color: #38bdf8; font-size: 0.9rem; margin-bottom: 10px;">Reproduciendo</div>
      <div id="mediaSpace"></div>
      <button class="btn-stop" onclick="stopAll()">Cerrar</button>
    </div>
  </div>

  <!-- Elemento de audio nativo oculto para manejar el stream de forma compatible -->
  <audio id="radioPlayer" style="display:none;"></audio>

  <script>
    const radioPlayer = document.getElementById('radioPlayer');

    function stopAll() {
      // Detiene la radio
      radioPlayer.pause();
      radioPlayer.src = "";
      
      // Limpia y oculta el espacio visual del reproductor
      document.getElementById('mediaSpace').innerHTML = '';
      document.getElementById('playerContainer').style.display = 'none';
    }
    
    function playAudio(url, name) {
      stopAll();
      document.getElementById('playerTitle').textContent = "Escuchando: " + name;
      document.getElementById('playerContainer').style.display = 'block';
      
      // Asignamos el flujo y reproducimos usando el elemento nativo del HTML
      radioPlayer.src = url;
      radioPlayer.load();
      radioPlayer.play().catch(error => {
        console.log("Espera de interacción para reproducir:", error);
      });
      
      // Agregamos un control visual con el reproductor oficial del navegador para asegurar compatibilidad
      document.getElementById('mediaSpace').innerHTML = `
        <audio controls autoplay style="width: 100%; margin-top: 10px;" onplay="syncNativePlay()" onpause="syncNativePause()">
          <source src="${url}" type="audio/mpeg">
          Tu navegador no soporta este reproductor.
        </audio>
      `;
    }

    // Funciones de apoyo para sincronizar el reproductor visible con el elemento del sistema
    function syncNativePlay() {
      radioPlayer.play();
    }
    
    function syncNativePause() {
      radioPlayer.pause();
    }

    function playVideo(url, name) {
      stopAll();
      document.getElementById('playerTitle').textContent = "Viendo: " + name;
      document.getElementById('playerContainer').style.display = 'block';
      document.getElementById('mediaSpace').innerHTML = `<div class="video-frame-wrapper"><iframe src="${url}"></iframe></div>`;
    }
  </script>
</body>
</html>
